<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScholarCheck</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>ScholarCheck</h1>
    <p>Audit bibliographique et génération de Related Work</p>
  </header>

  <main>
    <!-- TABS -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('checker')">Vérificateur de références</button>
      <button class="tab" onclick="switchTab('relatedwork')">Générateur Related Work</button>
    </div>

    <!-- MODULE 1 : CHECKER -->
    <section id="tab-checker" class="tab-content active">
      <h2>Auditer un manuscrit</h2>
      <p class="hint">Formats acceptés : .tex, .docx, .md</p>
      <div class="upload-zone" id="checker-drop">
        <input type="file" id="checker-file" accept=".tex,.docx,.md,.markdown" />
        <label for="checker-file">Glisse ton manuscrit ici ou clique pour choisir</label>
      </div>
      <button class="btn-primary" onclick="runChecker()">Analyser</button>

      <div id="checker-result" class="result hidden"></div>
    </section>

    <!-- MODULE 2 : RELATED WORK -->
    <section id="tab-relatedwork" class="tab-content hidden">
      <h2>Générer une section Related Work</h2>

      <div class="form-group">
        <label>Sujet de l'article</label>
        <input type="text" id="rw-topic" placeholder="Ex: Retrieval-Augmented Generation for scientific writing" />
      </div>

      <div class="form-group">
        <label>Option 1 — Upload corpus (fichiers .tex / .docx / .md)</label>
        <input type="file" id="rw-files" multiple accept=".tex,.docx,.md,.markdown" />
      </div>

      <div class="form-group">
        <label>Option 2 — Liste de DOIs (un par ligne)</label>
        <textarea id="rw-dois" rows="5" placeholder="10.1145/3442188.3445922&#10;10.18653/v1/2020.acl-main.600"></textarea>
      </div>

      <button class="btn-primary" onclick="runRelatedWork()">Générer</button>

      <div id="rw-result" class="result hidden"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
